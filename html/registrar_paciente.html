<div class="encabezado">

    <div class="menu">

<div class="contenido">

    <h2>Registrar paciente nuevo</h2>

    <form method="POST" action="../php/guardar_paciente.php">

        <!-- Caja de texto -->
        <label for="nombre">Nombre:</label>
        <input type="text" name="nombre" id="nombre" required>

        <label for="apellido">Apellido:</label>
        <input type="text" name="apellido" id="apellido" required>

        <label for="telefono">Telefono:</label>
        <input type="text" name="telefono" id="telefono">

        <label for="correo">Correo:</label>
        <input type="email" name="correo" id="correo">

        <label for="fecha_nacimiento">Fecha de nacimiento:</label>
        <input type="date" name="fecha_nacimiento" id="fecha_nacimiento">

        <label for="precauciones">Precauciones:</label>
        <textarea name="precauciones" id="precauciones"></textarea>

        <label>
            <input type="checkbox" name="crear_cuenta" value="si">
            Crear tambien una cuenta para que el paciente entre al sistema
        </label>

        <label for="usuario">Usuario del paciente:</label>
        <input type="text" name="usuario" id="usuario">

        <!-- Caja de contraseña -->
        <label for="contraseña">contraseña del paciente:</label>
        <input type="password" name="contraseña" id="contraseña">

        <br>
        <input class="boton" type="submit" value="Guardar paciente">
        <a class="boton" href="../php/pacientes.php">Regresar</a>

    </form>

</div>
